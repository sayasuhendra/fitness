name: Fitness Akhwat Backend CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: fitness_test
          POSTGRES_USER: fitness
          POSTGRES_PASSWORD: fitness
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v3
        with:
          php-version: "8.4"
          extensions: pdo_pgsql
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Prepare app
        run: |
          cp .env.example .env
          php artisan key:generate
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: fitness_test
          DB_USERNAME: fitness
          DB_PASSWORD: fitness
      - name: Run Pint
        run: ./vendor/bin/pint --test
      - name: Run tests
        run: php artisan test
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: fitness_test
          DB_USERNAME: fitness
          DB_PASSWORD: fitness
